version: '3.8'

services:

  flower-web-app:
    image: kajapathyk/my-flower
    container_name: flower-app
    ports:
      - "3016:3015"

  java-web-app:
    image: muralisocial123/transaction-image
    container_name: java-app
    ports:
      - "8081:8080"

  cart-app:
    image: muralisocial123/ey-cart:v1.1.0
    container_name: ey-cart
    ports:
      - "3001:3000"

  fitness-app:
    image: muralisocial123/ust-practice-fitness:v1.1.0
    container_name: fitness
    ports:
      - "5001:5000"